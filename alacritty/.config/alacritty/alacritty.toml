# Documentation:
# - alacritty(5)
# - https://github.com/alacritty/alacritty/blob/master/extra/man/alacritty.5.scd
#:schema https://github.com/distinction-dev/alacritty-schema/raw/refs/heads/main/alacritty/reference.json

[font]
# * https://wiki.archlinux.org/index.php/font_configuration#Fontconfig_configuration
# * file:///usr/share/doc/fontconfig/fontconfig-user.html
# normal = { family = "Terminus" }
# size = 10
normal = { family = "Terminess Nerd Font" }
size = 9
# Italics looks terrible with the Terminess font
# and original Terminus didn't have it either.
italic = { style = "" }

[mouse]
hide_when_typing = true

[window]
padding = { x = 2, y = 2 }

[general]
import = [
    "~/.config/alacritty/colors.toml",
    "~/.config/alacritty/keybindings.toml",
]
