# Default: https://github.com/sxyazi/yazi/blob/shipped/yazi-config/preset/keymap-default.toml
#:schema https://yazi-rs.github.io/schemas/keymap.json
"$schema" = "https://yazi-rs.github.io/schemas/keymap.json"

# Behavior
[[mgr.prepend_keymap]]
on = "<C-c>"
run = "quit --code=130"
desc = "Exit with code 130 (SIGINT)"

[[mgr.prepend_keymap]]
on = "q"
run = "close"
desc = "Close the current tab, or quit if it is the last tab"

[[mgr.prepend_keymap]]
on = [ "u", "q" ]
run = "plugin close-and-restore-tab restore"
desc = "Restore the closed tab"

# Movement
[[mgr.prepend_keymap]]
on = [ "[" ]
run = "plugin goto-sibling -- prev"
desc = "Go to the previous sibling folder"

[[mgr.prepend_keymap]]
on = [ "]" ]
run = "plugin goto-sibling -- next"
desc = "Go to the next sibling folder"

[[mgr.prepend_keymap]]
on = "<Home>"
run = "arrow top"
desc = "Go to top"

[[mgr.prepend_keymap]]
on = "<End>"
run = "arrow bot"
desc = "Go to bottom"

[[mgr.prepend_keymap]]
on   = "l"
run  = "plugin smart-enter"
desc = "Enter the child directory, or open the file"

[[mgr.prepend_keymap]]
on   = "<Enter>"
run  = "plugin smart-enter"
desc = "Enter the child directory, or open the file"

[[mgr.prepend_keymap]]
on   = "<Right>"
run  = "plugin smart-enter"
desc = "Enter the child directory, or open the file"

# Shell
[[mgr.prepend_keymap]]
on = "$"
run = "shell '; read' --interactive --block --cursor=0"
desc = "Run a shell command (block)"

[[mgr.prepend_keymap]]
on = "!"
run = "shell --interactive"
desc = "Run a shell command"

# New functionality (usually plugins)
[[mgr.prepend_keymap]]
on = "<C-y>"
run = ["plugin system-clipboard"]

[[mgr.prepend_keymap]]
on   = [ "g", "c" ]
run  = "plugin git-files"
desc = "Show Git file changes"

[[mgr.prepend_keymap]]
on   = "<C-p>"
run  = "plugin command"
desc = "Open command palette"

[[mgr.prepend_keymap]]
on   = [ "c", "m" ]
run  = "plugin chmod"
desc = "Chmod on selected files"

[[mgr.prepend_keymap]]
on = "T"
run = 'shell --orphan -- alacritty --working-directory "$PWD"'
desc = "Open Alacritty here"

###[ relative motions ]###
[[mgr.prepend_keymap]]
on = [ "1" ]
run = "plugin relative-motions 1"
desc = "Move in relative steps"

[[mgr.prepend_keymap]]
on = [ "2" ]
run = "plugin relative-motions 2"
desc = "Move in relative steps"

[[mgr.prepend_keymap]]
on = [ "3" ]
run = "plugin relative-motions 3"
desc = "Move in relative steps"

[[mgr.prepend_keymap]]
on = [ "4" ]
run = "plugin relative-motions 4"
desc = "Move in relative steps"

[[mgr.prepend_keymap]]
on = [ "5" ]
run = "plugin relative-motions 5"
desc = "Move in relative steps"

[[mgr.prepend_keymap]]
on = [ "6" ]
run = "plugin relative-motions 6"
desc = "Move in relative steps"

[[mgr.prepend_keymap]]
on = [ "7" ]
run = "plugin relative-motions 7"
desc = "Move in relative steps"

[[mgr.prepend_keymap]]
on = [ "8" ]
run = "plugin relative-motions 8"
desc = "Move in relative steps"

[[mgr.prepend_keymap]]
on = [ "9" ]
run = "plugin relative-motions 9"
desc = "Move in relative steps"

[[mgr.prepend_keymap]]
on = "<A-1>"
run = "tab_switch 0"
desc = "Switch to first tab"

[[mgr.prepend_keymap]]
on = "<A-2>"
run = "tab_switch 1"
desc = "Switch to second tab"

[[mgr.prepend_keymap]]
on = "<A-3>"
run = "tab_switch 2"
desc = "Switch to third tab"

[[mgr.prepend_keymap]]
on = "<A-4>"
run = "tab_switch 3"
desc = "Switch to fourth tab"

[[mgr.prepend_keymap]]
on = "<A-5>"
run = "tab_switch 4"
desc = "Switch to fifth tab"

[[mgr.prepend_keymap]]
on = "<A-6>"
run = "tab_switch 5"
desc = "Switch to sixth tab"

[[mgr.prepend_keymap]]
on = "<A-7>"
run = "tab_switch 6"
desc = "Switch to seventh tab"

[[mgr.prepend_keymap]]
on = "<A-8>"
run = "tab_switch 7"
desc = "Switch to eighth tab"

[[mgr.prepend_keymap]]
on = "<A-9>"
run = "tab_switch 8"
desc = "Switch to ninth tab"
###[ /relative motions ]###

[help]
prepend_keymap = [
    { on = "q",          run = "escape", desc = "Clear the filter, or hide the help" },
    { on = "u",          run = "arrow -50%",  desc = "Move cursor up half page" },
    { on = "d",          run = "arrow 50%",   desc = "Move cursor down half page" },
    { on = "<PageUp>",   run = "arrow -100%", desc = "Move cursor up one page" },
    { on = "<PageDown>", run = "arrow 100%",  desc = "Move cursor down one page" },
]
